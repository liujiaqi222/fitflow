name: AI Fitness Timer
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  AI Fitness Timer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AI Fitness Timer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ai-fitness-timer
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIBackgroundModes:
          - audio
    dependencies:
      - target: AI Fitness TimerWidget
  AI Fitness TimerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AI Fitness TimerTests
    dependencies:
      - target: AI Fitness Timer
  AI Fitness TimerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AI Fitness TimerUITests
    dependencies:
      - target: AI Fitness Timer
  AI Fitness TimerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AI Fitness TimerWidget
    info:
      path: AI Fitness TimerWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ai-fitness-timer.widget
schemes:
  AI Fitness Timer:
    build:
      targets:
        AI Fitness Timer: all
        AI Fitness TimerWidget: all
    test:
      targets:
        - AI Fitness TimerTests
        - AI Fitness TimerUITests
